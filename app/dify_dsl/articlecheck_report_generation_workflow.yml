        desc: 返回报告差量对象
        outputs:
        - value_selector:
          - '1719004002001'
          - text
          variable: report_generation_json
        selected: false
        title: 结束
        type: end
      height: 92
      id: '1719004003001'
      position:
        x: 730
        y: 195
      positionAbsolute:
        x: 730
        y: 195
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport:
      x: 0
      y: 0
      zoom: 0.85
  rag_pipeline_variables: []
