# ============================================================
# Article Check — Docker Compose 部署
# 符合 PPT WebDemo 规范：Nginx 反向代理 + API Key环境变量注入
# ============================================================

services:
  # ─── GROBID 解析服务 ──────────────────────────────────
  grobid:
    image: grobid/grobid:0.9.0-crf
    container_name: article-check-grobid
    restart: unless-stopped
    profiles:
      - with-grobid
    expose:
      - "8070"
      - "8071"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - article-check-net

  # ─── Nginx 反向代理 ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: article-check-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-3000}:80"          # 对外端口，默认 3000
    environment:
      - PLATFORM_AUTH_PROXY_TARGET=${PLATFORM_AUTH_PROXY_TARGET:-http://124.71.226.114:8444}
      - PLATFORM_AUTH_PROXY_HOST_HEADER=${PLATFORM_AUTH_PROXY_HOST_HEADER:-124.71.226.114:8444}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - article-check-net

  # ─── FastAPI 后端 ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: article-check:latest
    container_name: article-check-api
    restart: unless-stopped
    expose:
      - "8000"                            # 仅在内部网络暴露
    environment:
      # ⚠️ 平台部署默认走 Dify 代理，API Key 通过环境变量注入，勿硬编码
      - ARTICLE_CHECK_AI_PROVIDER=${ARTICLE_CHECK_AI_PROVIDER:-dify}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      - DIFY_APP_TYPE=${DIFY_APP_TYPE:-chat}
      - DIFY_RESPONSE_MODE=${DIFY_RESPONSE_MODE:-blocking}
      - DIFY_WORKFLOW_QUERY_KEY=${DIFY_WORKFLOW_QUERY_KEY:-query}
      - DIFY_INPUTS_JSON=${DIFY_INPUTS_JSON:-{}}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ARTICLE_CHECK_GROBID_ENABLED=${ARTICLE_CHECK_GROBID_ENABLED:-false}
      - ARTICLE_CHECK_GROBID_BASE_URL=${ARTICLE_CHECK_GROBID_BASE_URL:-http://grobid:8070}
      - ARTICLE_CHECK_IDENTITY_CACHE_PATH=/app/.article_check/reference_fast_cache.json
      - ARTICLE_CHECK_OFFLINE_INDEX_DIR=/app/.article_check/offline_indices
      - ARTICLE_CHECK_ROOT=/app
      - PYTHONPATH=/app
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - ARTICLE_CHECK_DIFY_BASE_URL=${ARTICLE_CHECK_DIFY_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_API_KEY=${ARTICLE_CHECK_DIFY_API_KEY:-}
      - ARTICLE_CHECK_DIFY_DOCUMENT_READ_BASE_URL=${ARTICLE_CHECK_DIFY_DOCUMENT_READ_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_DOCUMENT_READ_API_KEY=${ARTICLE_CHECK_DIFY_DOCUMENT_READ_API_KEY:-}
      - ARTICLE_CHECK_DIFY_DOCUMENT_READ_MODE=${ARTICLE_CHECK_DIFY_DOCUMENT_READ_MODE:-}
      - ARTICLE_CHECK_DIFY_DOCUMENT_READ_APP_REFERENCE=${ARTICLE_CHECK_DIFY_DOCUMENT_READ_APP_REFERENCE:-}
      - ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_BASE_URL=${ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_API_KEY=${ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_API_KEY:-}
      - ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_MODE=${ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_MODE:-}
      - ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_APP_REFERENCE=${ARTICLE_CHECK_DIFY_COMPONENT_CLASSIFICATION_APP_REFERENCE:-}
      - ARTICLE_CHECK_DIFY_FORMAT_REVIEW_BASE_URL=${ARTICLE_CHECK_DIFY_FORMAT_REVIEW_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_FORMAT_REVIEW_API_KEY=${ARTICLE_CHECK_DIFY_FORMAT_REVIEW_API_KEY:-}
      - ARTICLE_CHECK_DIFY_FORMAT_REVIEW_MODE=${ARTICLE_CHECK_DIFY_FORMAT_REVIEW_MODE:-}
      - ARTICLE_CHECK_DIFY_FORMAT_REVIEW_APP_REFERENCE=${ARTICLE_CHECK_DIFY_FORMAT_REVIEW_APP_REFERENCE:-}
      - ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_BASE_URL=${ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_API_KEY=${ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_API_KEY:-}
      - ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_MODE=${ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_MODE:-}
      - ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_APP_REFERENCE=${ARTICLE_CHECK_DIFY_REFERENCE_VERIFY_APP_REFERENCE:-}
      - ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_BASE_URL=${ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_API_KEY=${ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_API_KEY:-}
      - ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_MODE=${ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_MODE:-}
      - ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_APP_REFERENCE=${ARTICLE_CHECK_DIFY_HALLUCINATION_REVIEW_APP_REFERENCE:-}
      - ARTICLE_CHECK_DIFY_REPORT_GENERATION_BASE_URL=${ARTICLE_CHECK_DIFY_REPORT_GENERATION_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_REPORT_GENERATION_API_KEY=${ARTICLE_CHECK_DIFY_REPORT_GENERATION_API_KEY:-}
      - ARTICLE_CHECK_DIFY_REPORT_GENERATION_MODE=${ARTICLE_CHECK_DIFY_REPORT_GENERATION_MODE:-}
      - ARTICLE_CHECK_DIFY_REPORT_GENERATION_APP_REFERENCE=${ARTICLE_CHECK_DIFY_REPORT_GENERATION_APP_REFERENCE:-}
      - ARTICLE_CHECK_DIFY_REPORT_QA_BASE_URL=${ARTICLE_CHECK_DIFY_REPORT_QA_BASE_URL:-}
      - ARTICLE_CHECK_DIFY_REPORT_QA_API_KEY=${ARTICLE_CHECK_DIFY_REPORT_QA_API_KEY:-}
      - ARTICLE_CHECK_DIFY_REPORT_QA_MODE=${ARTICLE_CHECK_DIFY_REPORT_QA_MODE:-}
      - ARTICLE_CHECK_DIFY_REPORT_QA_APP_REFERENCE=${ARTICLE_CHECK_DIFY_REPORT_QA_APP_REFERENCE:-}
      - ARTICLE_CHECK_PLATFORM_AUTH_ENABLED=${ARTICLE_CHECK_PLATFORM_AUTH_ENABLED:-false}
      - ARTICLE_CHECK_PLATFORM_AUTH_MODE=${ARTICLE_CHECK_PLATFORM_AUTH_MODE:-legacy_oauth}
      - ARTICLE_CHECK_PLATFORM_AUTH_API_BASE=${ARTICLE_CHECK_PLATFORM_AUTH_API_BASE:-/prod-api}
      - ARTICLE_CHECK_PLATFORM_AUTH_HOST=${ARTICLE_CHECK_PLATFORM_AUTH_HOST:-http://124.71.226.114:8444}
      - ARTICLE_CHECK_PLATFORM_AUTH_CALLBACK_PATH=${ARTICLE_CHECK_PLATFORM_AUTH_CALLBACK_PATH:-/auth/login}
      - ARTICLE_CHECK_PLATFORM_AUTH_STORAGE_PREFIX=${ARTICLE_CHECK_PLATFORM_AUTH_STORAGE_PREFIX:-article_check_platform_}
      - ARTICLE_CHECK_PLATFORM_AUTH_DEBUG=${ARTICLE_CHECK_PLATFORM_AUTH_DEBUG:-false}
      - PLATFORM_AUTH_PROXY_TARGET=${PLATFORM_AUTH_PROXY_TARGET:-http://124.71.226.114:8444}
      - PLATFORM_AUTH_PROXY_HOST_HEADER=${PLATFORM_AUTH_PROXY_HOST_HEADER:-124.71.226.114:8444}
    volumes:
      - reports_data:/app/reports          # 报告持久化
      - uploads_data:/app/uploads          # 上传文件持久化
      - ./.article_check:/app/.article_check
      - ./article_check:/app/article_check
      - ./dify_dsl:/app/dify_dsl
      - ./北师大论文格式要求:/app/北师大论文格式要求
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - article-check-net

  # ─── Redis（可选 — 用于会话缓存/限流）───────────────
  redis:
    image: redis:7-alpine
    container_name: article-check-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - article-check-net
    profiles:
      - with-redis                        # 默认不启动; docker compose --profile with-redis up

networks:
  article-check-net:
    driver: bridge

volumes:
  reports_data:
  uploads_data:
